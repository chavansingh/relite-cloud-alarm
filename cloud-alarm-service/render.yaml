services:
  - type: web
    name: relite-cloud-alarm-service
    env: node
    plan: free
    rootDir: cloud-alarm-service
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: CONFIG_FILE
        value: config.relite.json
      - key: TIMEZONE
        value: Asia/Kolkata
      - key: TOPIC_PREFIX
        value: relite
      - key: DEFAULT_TARGET
        value: all
      - key: DEVICE_OFFLINE_MS
        value: "35000"
      - key: RETRY_ON_COUNT
        value: "3"
      - key: RETRY_OFF_COUNT
        value: "3"
      - key: RETRY_GAP_MINUTES
        value: "5"

  - type: web
    name: relite2-cloud-alarm-service
    env: node
    plan: free
    rootDir: cloud-alarm-service
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: CONFIG_FILE
        value: config.relite2.json
      - key: TIMEZONE
        value: Asia/Kolkata
      - key: TOPIC_PREFIX
        value: relite2
      - key: DEFAULT_TARGET
        value: all
      - key: DEVICE_OFFLINE_MS
        value: "35000"
      - key: RETRY_ON_COUNT
        value: "3"
      - key: RETRY_OFF_COUNT
        value: "3"
      - key: RETRY_GAP_MINUTES
        value: "5"
