name: Deploy Relite Dashboard Pages

on:
  push:
    branches:
      - main
    paths:
      - dashboard/Dashboard_Relite.html
      - dashboard/Dashboard_Relite_2.html
      - dashboard/pump.png
      - dashboard/pump3.png
      - dashboard/WhatsApp Image 2026-05-24 at 9.03.05 AM.jpeg
      - .github/workflows/deploy-dashboard-relite-pages.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp dashboard/Dashboard_Relite.html _site/index.html
          cp dashboard/Dashboard_Relite.html _site/Dashboard_Relite.html
          cp dashboard/Dashboard_Relite_2.html _site/Dashboard_Relite_2.html
          cp dashboard/pump.png _site/pump.png
          cp dashboard/pump3.png _site/pump3.png
          cp "dashboard/WhatsApp Image 2026-05-24 at 9.03.05 AM.jpeg" "_site/WhatsApp Image 2026-05-24 at 9.03.05 AM.jpeg"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: _site
