name: Trigger Render Deploy Hook

on:
  push:
    branches:
      - main
    paths:
      - cloud-alarm-service/**
      - dashboard/Dashboard_Relite.html
      - dashboard/pump.png
      - dashboard/pump3.png
      - dashboard/WhatsApp Image 2026-05-24 at 9.03.05 AM.jpeg
      - .github/workflows/render-deploy-hook.yml
  workflow_dispatch:

jobs:
  trigger-render:
    runs-on: ubuntu-latest
    steps:
      - name: Call Render deploy hook (relite)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "Missing secret: RENDER_DEPLOY_HOOK (skip deploy hook)"
            exit 0
          fi

          curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
          echo "Render deploy hook triggered: relite"
