name: Trigger Render Deploy Hook

on:
  push:
    branches:
      - main
    paths:
      - cloud-alarm-service/**
      - dashboard/Dashboard_Relite.html
      - dashboard/pump.png
      - dashboard/pump3.png
      - dashboard/WhatsApp Image 2026-05-24 at 9.03.05 AM.jpeg
      - .github/workflows/render-deploy-hook.yml
  workflow_dispatch:

jobs:
  trigger-render:
    runs-on: ubuntu-latest
    steps:
      - name: Call Render deploy hooks (relite + relite2)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
          RENDER_DEPLOY_HOOK_RELITE2: ${{ secrets.RENDER_DEPLOY_HOOK_RELITE2 }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "Missing secret: RENDER_DEPLOY_HOOK"
            exit 1
          fi

          curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
          echo "Render deploy hook triggered: relite"

          if [ -n "$RENDER_DEPLOY_HOOK_RELITE2" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK_RELITE2"
            echo "Render deploy hook triggered: relite2"
          else
            echo "RENDER_DEPLOY_HOOK_RELITE2 not set, relite2 hook skipped"
          fi